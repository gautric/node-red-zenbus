<script type="text/javascript">
  RED.nodes.registerType('zenbus-next-bus', {
    category: 'transport',
    color: '#5BA8A8',
    defaults: {
      name: { value: '' },
      alias: { value: '', required: true },
      itinerary: { value: '', required: true },
      stop: { value: '', required: true },
      interval: { value: 10, validate: RED.validators.number() }
    },
    inputs: 0,
    outputs: 1,
    icon: 'zenbus.png',
    label: function () {
      return this.name || 'zenbus ' + (this.alias || '');
    },
    labelStyle: function () {
      return this.name ? 'node_label_italic' : '';
    },
    paletteLabel: 'zenbus',
    outputLabels: ['bus ETA data']
  });
</script>

<script type="text/html" data-template-name="zenbus-next-bus">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-alias"><i class="fa fa-globe"></i> Alias</label>
    <input type="text" id="node-input-alias" placeholder="e.g. gpso">
  </div>
  <div class="form-row">
    <label for="node-input-itinerary"><i class="fa fa-road"></i> Itinerary</label>
    <input type="text" id="node-input-itinerary" placeholder="Itinerary ID">
  </div>
  <div class="form-row">
    <label for="node-input-stop"><i class="fa fa-map-marker"></i> Stop</label>
    <input type="text" id="node-input-stop" placeholder="Stop ID">
  </div>
  <div class="form-row">
    <label for="node-input-interval"><i class="fa fa-clock-o"></i> Interval (s)</label>
    <input type="number" id="node-input-interval" min="5" step="1">
  </div>
</script>

<script type="text/html" data-help-name="zenbus-next-bus">
  <p>Polls the Zenbus real-time API and outputs next bus ETA for a configured stop.</p>

  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload.stop <span class="property-type">string</span></dt>
    <dd>Stop name.</dd>
    <dt>payload.line <span class="property-type">string</span></dt>
    <dd>Line code.</dd>
    <dt>payload.now <span class="property-type">string</span></dt>
    <dd>Current time as HhMM.</dd>
    <dt>payload.first <span class="property-type">object | null</span></dt>
    <dd>First bus with properties: <code>eta</code>, <code>distance</code>,
        <code>estimatedArrival</code>, <code>scheduledTime</code>, <code>isLive</code>.</dd>
    <dt class="optional">payload.next <span class="property-type">object | null</span></dt>
    <dd>Second tracked bus (same properties as <code>msg.payload.first</code>).</dd>
    <dt>payload.timestamp <span class="property-type">string</span></dt>
    <dd>ISO 8601 timestamp of the poll.</dd>
  </dl>

  <h3>Details</h3>
  <p>This node polls the <a href="https://zenbus.net">Zenbus</a> API at the configured
     interval and sends a message with the next bus ETA for the specified stop.</p>
  <p>Configure the node with the <code>alias</code>, <code>itinerary</code> and
     <code>stop</code> values found in the Zenbus URL:</p>
  <pre>https://zenbus.net/publicapp/web/{alias}?line=...&amp;stop={stop}&amp;itinerary={itinerary}</pre>
  <p>The node status shows a green dot with the ETA when live tracking is available,
     a yellow dot when using scheduled data, or grey when no bus is found.</p>

  <h3>References</h3>
  <ul>
    <li><a href="https://zenbus.net">Zenbus</a> - real-time bus tracking platform</li>
    <li><a href="https://github.com/gautric/node-red-zenbus">GitHub</a> - the node's repository</li>
  </ul>
</script>
